#####################################################################################################
##### NSPANEL ESPHOME created by Blackymas - https://github.com/Blackymas/NSPanel_HA_Blueprint  #####
##### ESPHOME CORE - HARDWARE - Memory                                                          #####
##### PLEASE only make changes if it is necessary and also the required knowledge is available. #####
##### For normal use with the Blueprint, no changes are necessary.                              #####
#####################################################################################################
---
substitutions:
  ##############################
  ## Change only in your      ##
  ## local yaml substitutions ##
  ##############################
  BOOT_STEP_HW_MEMORY: '6'
  #GPIO_PSRAM_CLK_PIN: 5
  #GPIO_PSRAM_CS_PIN: 18
  TAG_HW_MEMORY: nspanel.hw.memory

esp32:
  framework:
    advanced:
      loop_task_stack_size: 16384
      ## minimum_chip_revision: "3.0"  # To do: Wait as this was released on v2026.1.0
    sdkconfig_options:
      CONFIG_ESP32_REV_MIN_3: y  # Remove after implementing `minimum_chip_revision`
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: y
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: y
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT: y
      CONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: y
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: y
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: y
      CONFIG_SPIRAM_RODATA: y

esphome:
  platformio_options:
    build_flags:
      - -D NSPANEL_HA_BLUEPRINT_HW_MEMORY
      - -D USE_ESP32_MIN_CHIP_REVISION_SET  # Remove after implementing `minimum_chip_revision`

nspanel_ha_blueprint:
  main_task_stack_size: 16384  # To-do: Review this when PR#10564 gets merged
  psram_clk_pin: ${GPIO_PSRAM_CLK_PIN}
  psram_cs_pin: ${GPIO_PSRAM_CS_PIN}

psram:
  id: ext_ram
  mode: quad                
  speed: 80MHz   

wifi:
  use_psram: true
...
